name: Build APK and AAR

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-30" \
            "build-tools;30.0.3" \
            "cmake;3.18.1" \
            "ndk;21.4.7075529"

      - name: Prepare local.properties
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK and AAR outputs
        run: |
          ./gradlew --no-daemon --stacktrace \
            clean \
            :app:assembleRelease \
            :Bcore:assembleRelease \
            :Bcore:black-fake:assembleRelease \
            :Bcore:black-hook:assembleRelease \
            :Bcore:pine-core:assembleRelease \
            :Bcore:pine-xposed:assembleRelease \
            :Bcore:pine-xposed-res:assembleRelease \
            :android-mirror:assembleRelease \
            :thirdparty:free-reflection:assembleRelease \
            :thirdparty:catloadinglibrary:assembleRelease \
            :thirdparty:floatingview:assembleRelease \
            :thirdparty:rvadapter:assembleRelease \
            :thirdparty:stateview:assembleRelease \
            :thirdparty:cornerlabelview:assembleRelease

      - name: Collect APK and AAR artifacts
        run: |
          mkdir -p out/apk out/aar
          find . -type f -path "*/build/outputs/apk/*/release/*.apk" -exec cp -v {} out/apk/ \;
          find . -type f -path "*/build/outputs/aar/*.aar" -exec cp -v {} out/aar/ \;

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blackbox-apk-release
          path: out/apk/
          if-no-files-found: error

      - name: Upload AAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blackbox-aar-release
          path: out/aar/
          if-no-files-found: error
